name: Build macOS & Upload to S3

on:
  push:
    branches: [master]
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller PySide6 Pillow

      - name: Generate macOS icon
        run: |
          python3 -c "
          from PIL import Image
          import subprocess, os

          img = Image.open('peek.ico')
          if hasattr(img, 'n_frames') and img.n_frames > 1:
              best_size = 0
              best_frame = 0
              for i in range(img.n_frames):
                  img.seek(i)
                  if img.size[0] > best_size:
                      best_size = img.size[0]
                      best_frame = i
              img.seek(best_frame)

          img = img.convert('RGBA')
          if img.size[0] < 1024:
              img = img.resize((1024, 1024), Image.LANCZOS)
          img.save('/tmp/peek_icon_1024.png', format='PNG')
          img.close()

          os.makedirs('peek.iconset', exist_ok=True)
          for size, name in [
              (16, 'icon_16x16.png'), (32, 'icon_16x16@2x.png'),
              (32, 'icon_32x32.png'), (64, 'icon_32x32@2x.png'),
              (128, 'icon_128x128.png'), (256, 'icon_128x128@2x.png'),
              (256, 'icon_256x256.png'), (512, 'icon_256x256@2x.png'),
              (512, 'icon_512x512.png'), (1024, 'icon_512x512@2x.png'),
          ]:
              subprocess.run(['sips', '-z', str(size), str(size), '/tmp/peek_icon_1024.png',
                              '--out', f'peek.iconset/{name}'], capture_output=True)
          "
          iconutil -c icns peek.iconset
          rm -rf peek.iconset

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --windowed \
            --name "RFab Viewer" \
            --icon peek.icns \
            --add-data "peek:peek" \
            --osx-bundle-identifier "com.rfab.viewer" \
            --clean \
            main.py

      - name: Code sign
        continue-on-error: true
        env:
          APPLE_SIGNING_KEY: ${{ secrets.APPLE_SIGNING_KEY }}
          APPLE_SIGNING_CERT: ${{ secrets.APPLE_SIGNING_CERT }}
        run: |
          set -x
          if [ -z "$APPLE_SIGNING_KEY" ] || [ -z "$APPLE_SIGNING_CERT" ]; then
            echo "No signing credentials - skipping code sign"
            exit 0
          fi

          APP_PATH=$(find dist -name "*.app" -type d | head -1)
          echo "App path: $APP_PATH"

          # Decode signing credentials from base64 secrets
          echo "$APPLE_SIGNING_KEY" | base64 -d > /tmp/rfab-signing.key
          echo "$APPLE_SIGNING_CERT" | base64 -d > /tmp/rfab-cert.cer

          # Create a temporary keychain for CI
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          KEYCHAIN_PASS="ci-build-pass"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Convert key + cert to p12 and import
          openssl x509 -inform DER -in /tmp/rfab-cert.cer -out /tmp/peek-cert.pem 2>/dev/null || \
          openssl x509 -inform PEM -in /tmp/rfab-cert.cer -out /tmp/peek-cert.pem 2>/dev/null

          openssl pkcs12 -export -legacy -out /tmp/peek-signing.p12 \
            -inkey /tmp/rfab-signing.key \
            -in /tmp/peek-cert.pem \
            -name "Developer ID Application: Pragmatist Foundation (AFBVMK56D7)" \
            -passout pass:peek 2>&1 || \
          openssl pkcs12 -export -out /tmp/peek-signing.p12 \
            -inkey /tmp/rfab-signing.key \
            -in /tmp/peek-cert.pem \
            -name "Developer ID Application: Pragmatist Foundation (AFBVMK56D7)" \
            -passout pass:peek

          security import /tmp/peek-signing.p12 -k "$KEYCHAIN_PATH" -P "peek" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Add build keychain to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Find the signing identity
          CODESIGN_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(Developer ID Application: .*\)"/\1/')
          echo "Found identity: $CODESIGN_ID"

          if [ -n "$CODESIGN_ID" ]; then
            # Sign all nested frameworks/dylibs first, then the app
            find "$APP_PATH" -name "*.dylib" -o -name "*.so" -o -name "*.framework" | while read f; do
              codesign --force --options runtime --sign "$CODESIGN_ID" "$f" 2>/dev/null || true
            done
            codesign --deep --force --options runtime \
              --entitlements entitlements.plist \
              --sign "$CODESIGN_ID" \
              "$APP_PATH"
            echo "Code signing complete"
            echo "SIGNED=true" >> $GITHUB_ENV
          else
            echo "WARNING: No signing identity found"
            security find-identity -v -p codesigning
          fi

          rm -f /tmp/rfab-signing.key /tmp/rfab-cert.cer /tmp/peek-cert.pem /tmp/peek-signing.p12

      - name: Notarize
        if: env.SIGNED == 'true'
        continue-on-error: true
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          APP_PATH=$(find dist -name "*.app" -type d | head -1)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" /tmp/peek-notarize.zip
          echo "Submitting for notarization (this may take 2-10 minutes)..."
          xcrun notarytool submit /tmp/peek-notarize.zip \
            --apple-id "collinsmalcolm@gmail.com" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "AFBVMK56D7" \
            --wait
          xcrun stapler staple "$APP_PATH"
          echo "Notarization complete and stapled"
          rm -f /tmp/peek-notarize.zip

      - name: List build output
        run: |
          echo "=== dist/ contents ==="
          ls -laR dist/ | head -60

      - name: Create DMG
        run: |
          APP_PATH=$(find dist -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found!"
            ls -laR dist/
            exit 1
          fi
          # Create DMG staging folder with app + Applications symlink
          mkdir -p /tmp/dmg-staging
          cp -R "$APP_PATH" /tmp/dmg-staging/
          ln -s /Applications /tmp/dmg-staging/Applications
          # Create DMG from staging folder (user sees app + Applications folder to drag into)
          hdiutil create -volname "RFab Viewer" \
            -srcfolder /tmp/dmg-staging \
            -ov -format UDZO \
            "dist/RFab Viewer.dmg"
          rm -rf /tmp/dmg-staging

      - name: Upload DMG as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: RFab-Viewer-macOS
          path: dist/RFab Viewer.dmg

      - name: Upload DMG to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          which aws || pip install awscli
          ls -lh "dist/RFab Viewer.dmg"
          aws s3 cp "dist/RFab Viewer.dmg" "s3://rfab-media/downloads/RFab Viewer.dmg" --content-type application/octet-stream
          echo "Uploaded to: https://rfab-media.s3.us-east-1.amazonaws.com/downloads/RFab Viewer.dmg"
